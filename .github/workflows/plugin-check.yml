name: Plugin Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  plugin-check:
    name: Plugin Check (WP latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build clean plugin directory
        run: |
          rm -rf build && mkdir -p build/notice-vault
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.wordpress-org' \
            --exclude='.claude' \
            --exclude='.claude.local' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpcs.xml' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='README.md' \
            --exclude='CHANGELOG.md' \
            --exclude='*.zip' \
            --exclude='*.tar.gz' \
            ./ build/notice-vault/

      - name: List build contents
        run: |
          echo "Files in build/notice-vault/:"
          find build/notice-vault -maxdepth 3 -print

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ./build/notice-vault
